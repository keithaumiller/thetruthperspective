name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy modules to server
      uses: appleboy/ssh-action@v0.1.5
      env:
        HUBGIT_PAT: ${{ secrets.HUBGIT_PAT }}
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.PRIVATE_KEY }}
        envs: HUBGIT_PAT
        script: |
          set -e  # Exit on any error
          
          echo "=== Starting deployment ==="
          
          # Navigate to custom modules directory (now the git repository)
          cd /var/www/html/drupal/modules/custom
          
          # Configure git safe directory
          git config --global --add safe.directory /var/www/html/drupal/modules/custom
          
          # Set ownership to ubuntu for git operations
          sudo chown -R ubuntu:ubuntu .git
          sudo chown -R ubuntu:ubuntu .
          
          # Debug: Show current state
          echo "=== Current git state ==="
          git status
          git log --oneline -3
          echo "Current remote URL:"
          git remote -v
          
          # Ensure we're using HTTPS URL with token authentication
          git remote set-url origin https://${HUBGIT_PAT}@github.com/keithaumiller/thetruthperspective.git
          echo "Updated remote URL to HTTPS with authentication"
          
          # Pull the latest changes with error checking
          echo "=== Fetching latest changes ==="
          if ! git fetch origin main; then
            echo "ERROR: Failed to fetch from GitHub"
            exit 1
          fi
          
          echo "=== After fetch ==="
          git log --oneline -3
          
          echo "=== Resetting to origin/main ==="
          git reset --hard origin/main
          
          echo "=== After reset ==="
          git log --oneline -3
          echo "Files in repository:"
          ls -la
          
          # === ADD THIS VERIFICATION SECTION ===
          echo "=== Verifying key_metric_management deployment ==="
          if [ -d "key_metric_management" ]; then
            echo "✅ key_metric_management directory found"
            
            echo "Directory structure:"
            find key_metric_management/ -type f | head -20
            
            if [ -d "key_metric_management/templates" ]; then
              echo "✅ Templates directory exists:"
              ls -la key_metric_management/templates/
            else
              echo "❌ Templates directory missing!"
            fi
            
            if [ -d "key_metric_management/src/Plugin/Block" ]; then
              echo "✅ Block plugin directory exists:"
              ls -la key_metric_management/src/Plugin/Block/
            else
              echo "❌ Block plugin directory missing!"
            fi
          else
            echo "❌ key_metric_management directory not found!"
          fi
          # === END VERIFICATION SECTION ===
          
          # Set proper permissions for all modules
          sudo chown -R ubuntu:ubuntu .git
          sudo chown -R www-data:www-data news_extractor ai_conversation job_application_automation key_metric_management
          sudo find news_extractor -type f -exec chmod 644 {} \;
          sudo find news_extractor -type d -exec chmod 755 {} \;
          sudo find ai_conversation -type f -exec chmod 644 {} \;
          sudo find ai_conversation -type d -exec chmod 755 {} \;
          sudo find job_application_automation -type f -exec chmod 644 {} \;
          sudo find job_application_automation -type d -exec chmod 755 {} \;
          sudo find key_metric_management -type f -exec chmod 644 {} \;
          sudo find key_metric_management -type d -exec chmod 755 {} \;
          
          echo "=== All four modules deployed successfully ==="
          
          # === Copy custom node--article.html.twig to Olivero theme ===
          OLIVERO_PATH="/var/www/html/drupal/core/themes/olivero"
          CUSTOM_TWIG_SRC="/var/www/html/drupal/modules/custom/news_extractor/templates/node--article.html.twig"
          CUSTOM_TWIG_DEST="$OLIVERO_PATH/templates/node--article.html.twig"
          sudo mkdir -p "$OLIVERO_PATH/templates"
          if [ -f "$CUSTOM_TWIG_SRC" ]; then
            sudo cp "$CUSTOM_TWIG_SRC" "$CUSTOM_TWIG_DEST"
            sudo chown www-data:www-data "$CUSTOM_TWIG_DEST"
            sudo chmod 644 "$CUSTOM_TWIG_DEST"
            echo "Custom node--article.html.twig copied to Olivero theme."
          else
            echo "Custom node--article.html.twig not found at $CUSTOM_TWIG_SRC"
          fi

    - name: Clear Drupal cache
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.PRIVATE_KEY }}
        script: |
          set -e  # Exit on any error
          
          echo "=== Clearing Drupal cache ==="
          
          # Fix file permissions for Drupal files directory
          sudo chown -R www-data:www-data /var/www/html/drupal/sites/default/files
          sudo find /var/www/html/drupal/sites/default/files -type f -exec chmod 664 {} \;
          sudo find /var/www/html/drupal/sites/default/files -type d -exec chmod 775 {} \;
          
          # Enable modules if not already enabled
          cd /var/www/html/drupal
          sudo -u www-data drush en news_extractor -y || echo "news_extractor already enabled"
          sudo -u www-data drush en key_metric_management -y || echo "key_metric_management already enabled"
          
          # === ADD THIS TEMPLATE VERIFICATION ===
          echo "=== Verifying key_metric_management templates ==="
          sudo -u www-data drush php-eval "
          echo 'Checking template discovery...\n';
          \$theme_registry = \Drupal::service('theme.registry')->get();
          
          \$templates = ['key_metric_stats', 'key_metric_detail', 'key_metric_stats_block'];
          foreach (\$templates as \$template) {
            if (isset(\$theme_registry[\$template])) {
              echo '✅ ' . \$template . ' template found\n';
            } else {
              echo '❌ ' . \$template . ' template missing\n';
            }
          }
          
          \$block_manager = \Drupal::service('plugin.manager.block');
          \$definitions = \$block_manager->getDefinitions();
          if (isset(\$definitions['key_metric_stats_block'])) {
            echo '✅ Block plugin discovered\n';
          } else {
            echo '❌ Block plugin not discovered\n';
          }
          " || echo "Verification failed"
          # === END TEMPLATE VERIFICATION ===
          
          # Clear Drupal cache as www-data user
          if ! sudo -u www-data drush cr; then
            echo "ERROR: Failed to clear Drupal cache"
            exit 1
          fi
          
          echo "=== Cache cleared successfully ==="
